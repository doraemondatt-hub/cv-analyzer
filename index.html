<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI CV Screening System</title>
    <!-- Google Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-gradient: linear-gradient(to right, #00d2ff, #3a7bd5);
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.125);
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
            --success: #00f2fe;
            --danger: #ff4b2b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0f0c29;
            /* Fallback */
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Background Decorative Blobs */
        .blob {
            position: fixed;
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.4;
        }

        .blob-1 {
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            bottom: -100px;
            right: -100px;
            background: #00d2ff;
        }

        .container {
            width: 100%;
            max-width: 900px;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -1px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Glass Card Style */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus,
        textarea:focus {
            border-color: #764ba2;
            background: rgba(255, 255, 255, 0.1);
        }

        textarea {
            resize: none;
        }

        /* Dropzone Area */
        #dropzone {
            border: 2px dashed var(--glass-border);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        #dropzone:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: #764ba2;
        }

        #dropzone span {
            font-size: 3rem;
            display: block;
            margin-bottom: 10px;
        }

        /* File List / Chips */
        .file-list {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .file-chip {
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--glass-border);
        }

        .file-chip button {
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-weight: bold;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        #btnAnalyze {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.4);
        }

        #btnAnalyze:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        #btnAnalyze:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        #btnReport {
            background: linear-gradient(to right, #11998e, #38ef7d);
            color: white;
            margin-top: 20px;
        }

        /* Progress Bar */
        #progressContainer {
            display: none;
            margin: 20px 0;
        }

        .progress-text {
            text-align: center;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .progress-bar-bg {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: var(--accent-gradient);
            transition: width 0.3s ease;
        }

        /* Table Styles */
        #resultCard {
            display: none;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            text-align: left;
            color: var(--text-dim);
            font-weight: 400;
            font-size: 0.85rem;
            padding: 12px;
            border-bottom: 1px solid var(--glass-border);
        }

        td {
            padding: 15px 12px;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .badge {
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .badge-pass {
            background: rgba(0, 242, 254, 0.2);
            color: #00f2fe;
        }

        .badge-fail {
            background: rgba(255, 75, 43, 0.2);
            color: #ff4b2b;
        }

        /* Responsive */
        @media (max-width: 600px) {
            header h1 {
                font-size: 1.8rem;
            }

            .card {
                padding: 20px;
            }

            th,
            td {
                padding: 10px 8px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>

<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <header>
            <h1>🤖 AI CV Screening System</h1>
        </header>

        <!-- Card 1: Campaign Info -->
        <div class="card">
            <div class="card-title">📋 Thông Tin Đợt Tuyển</div>
            <div class="form-group">
                <label for="campaign">Tên chiến dịch tuyển dụng</label>
                <input type="text" id="campaign" placeholder="Ví dụ: Senior Frontend Developer 2024">
            </div>
            <div class="form-group">
                <label for="jd">Mô tả công việc - JD</label>
                <textarea id="jd" placeholder="Dán yêu cầu công việc vào đây..."></textarea>
            </div>
            <div class="form-group">
                <label for="emails">Email nhận báo cáo (cách nhau bằng dấu phẩy)</label>
                <input type="text" id="emails" placeholder="manager@company.com, hr@company.com">
            </div>
        </div>

        <!-- Card 2: Upload -->
        <div class="card">
            <div class="card-title">📂 Tải Hồ Sơ</div>
            <div id="dropzone">
                <span>📂</span>
                <p>Kéo thả CV vào đây hoặc nhấn để chọn</p>
            </div>
            <input type="file" id="fileInput" multiple accept=".pdf,.txt,.docx" style="display: none;">
            <div class="file-list" id="fileList"></div>
        </div>

        <button id="btnAnalyze" class="btn">🚀 Bắt Đầu Phân Tích AI</button>

        <!-- Progress Section -->
        <div id="progressContainer">
            <div class="progress-text" id="progressText">Đang xử lý: 0/0</div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progressBarFill"></div>
            </div>
        </div>

        <!-- Card 3: Results -->
        <div id="resultCard" class="card">
            <div class="card-title">📊 Kết Quả Phân Tích</div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Tên Ứng Viên</th>
                            <th>Điểm (%)</th>
                            <th>Nhận Xét</th>
                            <th>Kết Luận</th>
                        </tr>
                    </thead>
                    <tbody id="resultBody">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>
            <button id="btnReport" class="btn">📧 Gửi Báo Cáo Cho Sếp</button>
        </div>
    </div>

    <script>
        /**
         * CONFIGURATION
         * Thay đổi URL Webhook của bạn tại đây
         */
        const WEBHOOK_1_URL = "https://dattran1223.id.vn/webhook/phan-tich-cv";
        const WEBHOOK_2_URL = "https://dattran1223.id.vn/webhook/cv-send-mail";

        // State Management
        let selectedFiles = [];

        // DOM Elements
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');
        const fileListContainer = document.getElementById('fileList');
        const btnAnalyze = document.getElementById('btnAnalyze');
        const btnReport = document.getElementById('btnReport');
        const progressContainer = document.getElementById('progressContainer');
        const progressText = document.getElementById('progressText');
        const progressBarFill = document.getElementById('progressBarFill');
        const resultCard = document.getElementById('resultCard');
        const resultBody = document.getElementById('resultBody');

        /**
         * FILE HANDLING LOGIC
         */
        dropzone.addEventListener('click', () => fileInput.click());

        dropzone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropzone.style.borderColor = '#764ba2';
        });

        dropzone.addEventListener('dragleave', () => {
            dropzone.style.borderColor = 'var(--glass-border)';
        });

        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.style.borderColor = 'var(--glass-border)';
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            for (let file of files) {
                // Tránh trùng lặp file (dựa trên name và size)
                if (!selectedFiles.some(f => f.name === file.name && f.size === file.size)) {
                    selectedFiles.push(file);
                }
            }
            renderFileList();
        }

        function renderFileList() {
            fileListContainer.innerHTML = '';
            selectedFiles.forEach((file, index) => {
                const chip = document.createElement('div');
                chip.className = 'file-chip';
                chip.innerHTML = `
                    ${file.name.substring(0, 15)}${file.name.length > 15 ? '...' : ''}
                    <button onclick="removeFile(${index}, event)">✕</button>
                `;
                fileListContainer.appendChild(chip);
            });
        }

        window.removeFile = (index, event) => {
            event.stopPropagation();
            selectedFiles.splice(index, 1);
            renderFileList();
        };

        /**
         * CORE LOGIC: ANALYZE
         */
        btnAnalyze.addEventListener('click', async () => {
            const campaign = document.getElementById('campaign').value.trim();
            const jd = document.getElementById('jd').value.trim();

            // Validation
            if (!campaign || !jd) {
                alert("⚠️ Vui lòng nhập đầy đủ Tên chiến dịch và JD!");
                return;
            }
            if (selectedFiles.length === 0) {
                alert("⚠️ Vui lòng chọn ít nhất một CV để phân tích!");
                return;
            }

            // UI Reset
            btnAnalyze.disabled = true;
            btnAnalyze.innerText = "⏳ Đang xử lý...";
            resultBody.innerHTML = '';
            resultCard.style.display = 'none';
            progressContainer.style.display = 'block';

            const allResults = [];
            const total = selectedFiles.length;

            try {
                // Vòng lặp tuần tự (Sequential) theo yêu cầu
                for (let i = 0; i < total; i++) {
                    const file = selectedFiles[i];

                    // Update Progress
                    const currentCount = i + 1;
                    progressText.innerText = `Đang xử lý: ${currentCount}/${total}`;
                    progressBarFill.style.width = `${(currentCount / total) * 100}%`;

                    // Prepare FormData
                    const formData = new FormData();
                    formData.append('campaign', campaign);
                    formData.append('jd', jd);
                    formData.append('file', file);

                    // API Call
                    const response = await fetch(WEBHOOK_1_URL, {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) throw new Error(`Lỗi server khi xử lý file: ${file.name}`);

                    const result = await response.json();
                    // Kỳ vọng response format: { name: "Nguyễn Văn A", score: 85, comment: "Kinh nghiệm tốt", conclusion: "Pass" }

                    allResults.push(result);
                    appendRowToTable(allResults.length, result);
                }

                // Finish
                resultCard.style.display = 'block';
                btnAnalyze.style.display = 'none';
                btnReport.style.display = 'flex';
                progressContainer.style.display = 'none';

            } catch (error) {
                console.error(error);
                alert("❌ Có lỗi xảy ra trong quá trình phân tích: " + error.message);
                btnAnalyze.disabled = false;
                btnAnalyze.innerText = "🚀 Bắt Đầu Phân Tích AI";
            }
        });

        function appendRowToTable(index, data) {
            const row = document.createElement('tr');
            const conclusionClass = data.conclusion?.toLowerCase() === 'pass' ? 'badge-pass' : 'badge-fail';

            row.innerHTML = `
                <td>${index}</td>
                <td style="font-weight:600">${data.name || 'N/A'}</td>
                <td>${data.score ?? 0}%</td>
                <td style="color: var(--text-dim); font-size: 0.8rem;">${data.comment || '-'}</td>
                <td><span class="badge ${conclusionClass}">${data.conclusion || 'Unknown'}</span></td>
            `;
            resultBody.appendChild(row);
        }

        /**
         * CORE LOGIC: REPORT
         */
        btnReport.addEventListener('click', async () => {
            const campaign = document.getElementById('campaign').value.trim();
            const emailsRaw = document.getElementById('emails').value;
            const recipients = emailsRaw.split(',')
                .map(e => e.trim())
                .filter(e => e !== "");

            if (recipients.length === 0) {
                alert("⚠️ Vui lòng nhập ít nhất một email nhận báo cáo!");
                return;
            }

            btnReport.disabled = true;
            btnReport.innerText = "⌛ Đang gửi...";

            try {
                const response = await fetch(WEBHOOK_2_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        campaign: campaign,
                        recipients: recipients
                    })
                });

                if (!response.ok) throw new Error("Không thể gửi báo cáo.");

                alert("✅ Báo cáo đã được gửi đến trưởng phòng!");
            } catch (error) {
                alert("❌ Lỗi khi gửi báo cáo: " + error.message);
            } finally {
                btnReport.disabled = false;
                btnReport.innerText = "📧 Gửi Báo Cáo Cho Sếp";
            }
        });
    </script>
</body>

</html>
